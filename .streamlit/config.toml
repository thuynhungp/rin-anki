[theme]
# Use "light" as the default base, but the system/browser preference will auto-toggle.
base = "light"

[theme.light]
primaryColor = "#0D9488"            # Soft, calm teal (Teal 600)
backgroundColor = "#F8F6F0"         # Cozy, warm cream/off-white background (reduces glare/eye strain)
secondaryBackgroundColor = "#EFECE6" # Warm light gray-brown for cards, inputs, sidebars
textColor = "#2D2A26"               # Soft dark slate-charcoal (less harsh than pure black)
borderColor = "#D1CFC7"             # Gentle border lines
dataframeBorderColor = "#D1CFC7"

[theme.dark]
primaryColor = "#2DD4BF"            # Soft teal accent for dark mode (Teal 400)
backgroundColor = "#1A1A1E"         # Deep neutral warm charcoal (less strain than pure black or neon dark blue)
secondaryBackgroundColor = "#26262B" # Soft warm gray for container backgrounds
textColor = "#E6E5E0"               # Off-white/cream text (reduces halo effect compared to pure white text)
borderColor = "#3D3D44"             # Subtle borders for dark mode
dataframeBorderColor = "#3D3D44"
